<div th:fragment="header" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <header
        class="bg-white/80 dark:bg-africanDark/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/5 sticky top-0 z-50 transition-colors duration-500">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

            <!-- Logo -->
            <a th:href="@{/}"
                class="group flex items-center gap-2 text-2xl font-black tracking-tighter uppercase italic">
                <span class="text-slate-900 dark:text-white group-hover:text-primary transition-colors"
                    th:text="#{app.logo.text}">UNE</span><span class="text-primary"
                    th:text="#{app.logo.accent}">VIE</span>
            </a>

            <!-- Menu (Desktop) -->
            <nav class="hidden md:flex gap-10 font-bold uppercase tracking-widest text-[10px]">
                <a th:href="@{/}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.home}">Accueil</a>
                <a th:href="@{/projets}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.projects}">Réalisations</a>
                <a th:href="@{/services}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.services}">Services</a>
                <a th:href="@{/entreprises}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors">Entreprises</a>
                <a th:href="@{/objectifs}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.vision}">Vision</a>
                <a th:href="@{/propos}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.about}" propos>À </a>
                <a th:href="@{/blog}"
                    class="text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-colors"
                    th:text="#{public.nav.blog}">Blog</a>
            </nav>

            <!-- Actions -->
            <div class="flex items-center gap-4 md:gap-6">
                <!-- Theme Toggle -->
                <button id="themeToggle"
                    class="h-10 w-10 flex items-center justify-center bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-all focus:outline-none">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>

                <!-- Language Selector -->
                <div class="relative lang-dropdown">
                    <button id="langDropdownBtn"
                        class="h-10 px-3 flex items-center justify-center bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl text-slate-500 dark:text-gray-400 hover:text-primary dark:hover:text-white transition-all group focus:outline-none gap-2">
                        <img id="currentFlag" class="w-5 h-auto rounded-sm object-cover"
                            th:src="${#locale.language == 'en' ? '/images/icon-lang/en.png' : (#locale.language == 'zh' ? '/images/icon-lang/chinois.png' : '/images/icon-lang/fr.png')}"
                            alt="Flag">
                        <i
                            class="fa-solid fa-chevron-down text-[8px] opacity-50 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                    <!-- Dropdown Menu -->
                    <div id="langDropdownMenu"
                        class="absolute right-0 mt-4 w-48 bg-white dark:bg-africanDark/95 backdrop-blur-2xl rounded-3xl shadow-2xl border border-slate-200 dark:border-white/10 py-3 hidden opacity-0 scale-95 transition-all duration-300 transform origin-top-right z-50">
                        <button onclick="changeLanguage('fr')"
                            class="w-full flex items-center px-4 py-3 text-sm text-slate-600 dark:text-gray-400 hover:bg-primary/10 hover:text-primary dark:hover:text-white transition-colors mx-1 rounded-2xl group text-left">
                            <img src="/images/icon-lang/fr.png" class="w-5 h-auto mr-3 rounded-sm" alt="FR">
                            <span class="font-bold">Français</span>
                        </button>
                        <button onclick="changeLanguage('en')"
                            class="w-full flex items-center px-4 py-3 text-sm text-slate-600 dark:text-gray-400 hover:bg-primary/10 hover:text-primary dark:hover:text-white transition-colors mx-1 rounded-2xl group text-left">
                            <img src="/images/icon-lang/en.png" class="w-5 h-auto mr-3 rounded-sm" alt="EN">
                            <span class="font-bold">English</span>
                        </button>
                        <button onclick="changeLanguage('zh')"
                            class="w-full flex items-center px-4 py-3 text-sm text-slate-600 dark:text-gray-400 hover:bg-primary/10 hover:text-primary dark:hover:text-white transition-colors mx-1 rounded-2xl group text-left">
                            <img src="/images/icon-lang/chinois.png" class="w-5 h-auto mr-3 rounded-sm" alt="ZH">
                            <span class="font-bold">中文 (Chinese)</span>
                        </button>
                    </div>
                </div>

                <!-- Anonymous Login -->
                <a sec:authorize="isAnonymous()" th:href="@{/login}"
                    class="hidden sm:block bg-primary hover:bg-red-800 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest text-[9px] transition-all active:scale-95 shadow-lg shadow-primary/20"
                    th:text="#{public.nav.login}">
                    Connexion
                </a>

                <!-- Authenticated Section -->
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-4 md:gap-8">
                    <a th:href="@{/mes-commandes}"
                        class="hidden lg:flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-primary hover:text-slate-900 dark:hover:text-white transition-colors">
                        <i class="fa-solid fa-box-open"></i>
                        <span th:text="#{public.nav.my_orders}">Mes Commandes</span>
                    </a>

                    <div class="flex items-center gap-4 pl-4 md:pl-6 border-l border-slate-200 dark:border-white/10">
                        <div class="flex flex-col items-end hidden sm:flex">
                            <span sec:authentication="name"
                                class="text-[10px] font-black uppercase tracking-tight text-slate-900 dark:text-white"></span>
                            <span
                                class="text-[8px] font-bold text-slate-500 dark:text-gray-500 uppercase tracking-widest"
                                th:text="#{public.user.label}">Utilisateur</span>
                        </div>
                        <form th:action="@{/logout}" method="post">
                            <button
                                class="w-10 h-10 bg-slate-100 dark:bg-white/5 hover:bg-red-500/10 border border-slate-200 dark:border-white/10 rounded-xl text-slate-500 dark:text-gray-400 hover:text-red-500 transition-all flex items-center justify-center">
                                <i class="fa-solid fa-power-off text-sm"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Mobile Menu Toggle -->
                <button class="md:hidden text-slate-900 dark:text-white text-xl" id="mobileMenuToggle">
                    <i class="fa-solid fa-bars-staggered" id="mobileMenuIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobileMenu"
        class="fixed inset-0 z-[60] bg-white dark:bg-africanDark hidden opacity-0 transition-opacity duration-300">
        <div class="flex flex-col h-full">
            <div class="flex justify-between items-center p-6 border-b border-slate-200 dark:border-white/5">
                <a th:href="@{/}" class="text-2xl font-black tracking-tighter uppercase italic">
                    <span class="text-slate-900 dark:text-white">UNE</span><span class="text-primary">VIE</span>
                </a>
                <button id="closeMobileMenu" class="text-slate-900 dark:text-white text-2xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <nav class="flex flex-col p-8 gap-8 font-black uppercase tracking-[0.2em] text-sm">
                <a th:href="@{/}" class="text-slate-900 dark:text-white" th:text="#{public.nav.home}">Accueil</a>
                <a th:href="@{/projets}" class="text-slate-900 dark:text-white"
                    th:text="#{public.nav.projects}">Réalisations</a>
                <a th:href="@{/services}" class="text-slate-900 dark:text-white"
                    th:text="#{public.nav.services}">Services</a>
                <a th:href="@{/entreprises}" class="text-slate-900 dark:text-white">Entreprises</a>
                <a th:href="@{/objectifs}" class="text-slate-900 dark:text-white"
                    th:text="#{public.nav.vision}">Vision</a>
                <a th:href="@{/propos}" class="text-slate-900 dark:text-white" th:text="#{public.nav.about}">À
                    propos</a>
                <a th:href="@{/blog}" class="text-slate-900 dark:text-white" th:text="#{public.nav.blog}">Blog</a>
                <a sec:authorize="isAnonymous()" th:href="@{/login}" class="text-primary"
                    th:text="#{public.nav.login}">Connexion</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/mes-commandes}" class="text-primary"
                    th:text="#{public.nav.my_orders}">Mes Commandes</a>
            </nav>
        </div>
    </div>

    <script th:inline="javascript">
        function changeLanguage(lang) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Dropdown logic
            const setupDropdown = (btnId, menuId) => {
                const btn = document.getElementById(btnId);
                const menu = document.getElementById(menuId);
                if (btn && menu) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (menu.classList.contains('hidden')) {
                            menu.classList.remove('hidden');
                            setTimeout(() => menu.classList.remove('opacity-0', 'scale-95'), 10);
                        } else {
                            menu.classList.add('opacity-0', 'scale-95');
                            setTimeout(() => menu.classList.add('hidden'), 300);
                        }
                    });
                }
            };

            setupDropdown('langDropdownBtn', 'langDropdownMenu');

            // Theme switching logic
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const html = document.documentElement;

            const updateThemeUI = (isDark) => {
                if (isDark) {
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                } else {
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                }
            };

            // Initialize UI
            updateThemeUI(html.classList.contains('dark'));

            themeToggle.addEventListener('click', () => {
                // Add transition class to body
                document.body.classList.add('theme-transition');

                if (html.classList.contains('dark')) {
                    html.classList.remove('dark');
                    localStorage.setItem('unevie-theme', 'light');
                    updateThemeUI(false);
                } else {
                    html.classList.add('dark');
                    localStorage.setItem('unevie-theme', 'dark');
                    updateThemeUI(true);
                }

                // Remove transition class after animation finished
                setTimeout(() => {
                    document.body.classList.remove('theme-transition');
                }, 500);
            });

            // Mobile Menu logic
            const mobileMenuToggle = document.getElementById('mobileMenuToggle');
            const closeMobileMenu = document.getElementById('closeMobileMenu');
            const mobileMenu = document.getElementById('mobileMenu');

            if (mobileMenuToggle && mobileMenu) {
                mobileMenuToggle.addEventListener('click', () => {
                    mobileMenu.classList.remove('hidden');
                    setTimeout(() => mobileMenu.classList.remove('opacity-0'), 10);
                    document.body.classList.add('overflow-hidden');
                });
            }

            if (closeMobileMenu && mobileMenu) {
                closeMobileMenu.addEventListener('click', () => {
                    mobileMenu.classList.add('opacity-0');
                    setTimeout(() => mobileMenu.classList.add('hidden'), 300);
                    document.body.classList.remove('overflow-hidden');
                });
            }

            // Close dropdowns on outside click
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('langDropdownMenu');
                const btn = document.getElementById('langDropdownBtn');
                if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => menu.classList.add('hidden'), 300);
                }
            });
        });
    </script>
</div>
