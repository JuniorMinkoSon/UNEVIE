<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head (title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} ?: 'UNEVIE — Services & Solutions Premium'">UNEVIE</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8e1010',
                        africanDark: '#0F172A',
                    }
                }
            }
        }
    </script>

    <script>
            // Theme Management - Initialize as early as possible to avoid flash
            (function () {
                const storedTheme = localStorage.getItem('unevie-theme');
                if (storedTheme === 'light') {
                    document.documentElement.classList.remove('dark');
                } else {
                    document.documentElement.classList.add('dark');
                }
            })();
    </script>

    <style>
        /* Smooth theme transitions */
        html.dark body {
            background-color: #0F172A;
            color: #ffffff;
        }

        html:not(.dark) body {
            background-color: #f8fafc;
            color: #0f172a;
        }

        .theme-transition,
        .theme-transition *,
        .theme-transition *:before,
        .theme-transition *:after {
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease, box-shadow 0.5s ease !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .animate-slideUp {
            animation: slideUp 0.6s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0F172A;
        }

        ::-webkit-scrollbar-thumb {
            background: #8e1010;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6b0c0c;
        }
    </style>

    <script defer th:src="@{/js/script.js}"></script>
</head>

</html>
