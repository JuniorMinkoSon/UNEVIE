<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | UNEVIE</title>
    <link rel="stylesheet" th:href="@{/css/application.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .animate-slideUp {
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        .animate-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .bg-primary {
            background-color: #EF4444;
        }

        /* Red-500 */
        .text-primary {
            color: #EF4444;
        }

        .focus\:ring-primary:focus {
            --tw-ring-color: #EF4444;
        }

        .shadow-primary\/40 {
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4), 0 4px 6px -2px rgba(239, 68, 68, 0.4);
        }

        .shadow-primary\/20 {
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2), 0 4px 6px -2px rgba(239, 68, 68, 0.2);
        }

        .selection\:bg-primary::selection {
            background-color: #EF4444;
        }
    </style>
</head>

<body class="bg-[#0F172A] min-h-screen flex items-center justify-center p-4 selection:bg-primary selection:text-white">

    <!-- Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-pulse"
            style="animation-delay: 1s;"></div>
    </div>

    <div class="w-full max-w-md relative animate-fadeIn">
        <!-- Logo/Title -->
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary shadow-2xl shadow-primary/40 mb-6 transform hover:rotate-12 transition-transform duration-500">
                <i class="fa-solid fa-shield-halved text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-white tracking-tight">UNEVIE <span class="text-primary">Admin</span>
            </h1>
            <p class="text-slate-400 mt-2 font-medium">Portail de gestion sécurisé</p>
        </div>

        <!-- Login Card -->
        <div
            class="bg-slate-800/50 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-slate-700/50 p-8 md:p-10 animate-slideUp">

            <div th:if="${param.error}"
                class="mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-bold flex items-center gap-3 animate-shake">
                <i class="fa-solid fa-circle-exclamation"></i>
                Identifiants incorrects
            </div>

            <form th:action="@{/admin/login}" method="post" class="space-y-6">
                <!-- Username -->
                <div class="space-y-2">
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Utilisateur</label>
                    <div class="relative group">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" name="username"
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            placeholder="Nom d'utilisateur" required autofocus>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Mot de
                        passe</label>
                    <div class="relative group">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="password"
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Remember Me & Forgot -->
                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox"
                            class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-primary focus:ring-primary focus:ring-offset-slate-900">
                        <span
                            class="text-sm font-medium text-slate-400 group-hover:text-slate-300 transition-colors">Rester
                            connecté</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-primary hover:bg-red-800 text-white font-extrabold py-4 rounded-2xl shadow-xl shadow-primary/20 transform hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    Connexion au tableau de bord
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>

        <!-- Footer Info -->
        <p class="text-center text-slate-500 mt-10 text-sm font-medium">
            &copy; 2025 UNEVIE Group. Tous droits réservés.
        </p>
    </div>

</body>

</html>
