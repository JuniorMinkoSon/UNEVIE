<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/admin-head :: head(title='Commandes clients | UNEVIE')}"></div>
</head>

<body>

    <div th:replace="~{fragments/admin-layout :: layout(content=~{::section})}">

        <section class="animate-fadeIn">
            <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

                <!-- ===== TITRE ===== -->
                <div
                    class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white dark:bg-white/5 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 backdrop-blur-xl">
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
                            <i class="fa-solid fa-box-open text-primary mr-3"></i>
                            Commandes Clients
                        </h2>
                        <p class="text-slate-500 dark:text-gray-400 mt-1">Suivez et gérez l'état des commandes passées
                            par vos utilisateurs.</p>
                    </div>
                    <div class="hidden md:flex items-center gap-3">
                        <span
                            class="inline-flex items-center px-4 py-2 rounded-xl text-sm font-bold bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-gray-300 border border-slate-200 dark:border-white/10"
                            th:text="${#lists.size(commandes)} + ' Commandes'">0 Commandes</span>
                    </div>
                </div>

                <!-- ===== AUCUNE COMMANDE ===== -->
                <div th:if="${#lists.isEmpty(commandes)}"
                    class="bg-white dark:bg-white/5 rounded-3xl p-20 text-center shadow-sm border border-slate-200 dark:border-white/5 animate-slideUp">
                    <div class="max-w-xs mx-auto">
                        <i class="fa-solid fa-inbox text-7xl mb-6 text-slate-200 dark:text-white/10"></i>
                        <p class="text-xl font-bold text-slate-400 dark:text-gray-500">Aucune commande enregistrée pour
                            le moment</p>
                    </div>
                </div>

                <!-- ===== TABLE COMMANDES ===== -->
                <div th:if="${!#lists.isEmpty(commandes)}"
                    class="bg-white dark:bg-white/5 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 overflow-hidden animate-slideUp">

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-100 dark:bg-white/5">
                                <tr>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        ID
                                    </th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Client / Contact</th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Produit</th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Paiement</th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Date
                                    </th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Modification
                                    </th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Total
                                    </th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider">
                                        Statut</th>
                                    <th
                                        class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider text-center">
                                        Action</th>
                                </tr>
                            </thead>

                            <tbody class="divide-y divide-slate-200 dark:divide-white/5">
                                <tr th:each="cmd : ${commandes}" class="hover:bg-slate-500/5 transition-colors group">

                                    <!-- ID -->
                                    <td class="py-4 px-6 text-sm font-mono font-bold text-primary"
                                        th:text="'#' + ${cmd.id}"></td>

                                    <!-- CLIENT -->
                                    <td class="py-4 px-6">
                                        <div class="flex flex-col">
                                            <span
                                                class="font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors"
                                                th:text="${cmd.user != null ? cmd.user.nom : cmd.nomClient}"></span>
                                            <span class="text-xs text-slate-500 dark:text-gray-500 italic"
                                                th:text="${cmd.user != null ? cmd.user.telephone : cmd.telephone}"></span>
                                        </div>
                                    </td>

                                    <!-- PRODUIT -->
                                    <td class="py-4 px-6">
                                        <span class="text-sm font-bold text-slate-700 dark:text-gray-300"
                                            th:text="${cmd.produit != null ? cmd.produit.nom : '—'}"></span>
                                    </td>

                                    <!-- MODE DE PAIEMENT -->
                                    <td class="py-4 px-6">
                                        <span
                                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-black bg-blue-500/10 text-blue-500 border border-blue-500/20 uppercase tracking-widest"
                                            th:text="${cmd.modePaiement}">
                                        </span>
                                    </td>

                                    <!-- DATE -->
                                    <td class="py-4 px-6">
                                        <span class="text-xs text-gray-500"
                                            th:text="${#temporals.format(cmd.dateCommande, 'dd/MM/yyyy HH:mm')}"></span>
                                    </td>
                                    <td class="py-4 px-6">
                                        <span class="text-xs text-gray-500 font-medium"
                                            th:text="${#temporals.format(cmd.updated_at, 'dd/MM/yyyy HH:mm')}"></span>
                                    </td>

                                    <!-- TOTAL -->
                                    <td class="py-4 px-6">
                                        <span class="font-extrabold text-green-600"
                                            th:text="${cmd.total} + ' FCFA'"></span>
                                    </td>

                                    <!-- STATUT -->
                                    <td class="py-4 px-6">
                                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold"
                                            th:classappend="${cmd.statut == 'EN_ATTENTE' ? 'bg-yellow-100 text-yellow-700 border border-yellow-200' : cmd.statut == 'EN_COURS' ? 'bg-blue-100 text-blue-700 border border-blue-200' : 'bg-green-100 text-green-700 border border-green-200'}"
                                            th:text="${cmd.statut}">
                                        </span>
                                    </td>

                                    <!-- ACTION -->
                                    <td class="py-4 px-6 text-center">
                                        <form th:action="@{'/admin/commandes/update/' + ${cmd.id}}" method="post"
                                            class="flex items-center gap-2 justify-center">

                                            <select name="statut"
                                                class="bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-lg text-xs font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none p-2 transition-all cursor-pointer">
                                                <option value="EN_ATTENTE" th:selected="${cmd.statut == 'EN_ATTENTE'}">
                                                    En attente</option>
                                                <option value="EN_COURS" th:selected="${cmd.statut == 'EN_COURS'}">En
                                                    cours</option>
                                                <option value="LIVRÉ" th:selected="${cmd.statut == 'LIVRÉ'}">Livré
                                                </option>
                                            </select>

                                            <button type="submit"
                                                class="p-2 bg-primary hover:bg-red-800 text-white rounded-lg transition-all shadow-md active:scale-95"
                                                title="Mettre à jour">
                                                <i class="fa fa-sync-alt text-xs"></i>
                                            </button>
                                        </form>
                                    </td>

                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>

                <!-- ===== RETOUR DASHBOARD ===== -->
                <div class="text-center mt-12 mb-8">
                    <a th:href="@{/admin/dashboard}"
                        class="inline-flex items-center text-slate-500 dark:text-gray-500 hover:text-primary transition-colors font-bold group">
                        <i class="fa-solid fa-arrow-left mr-3 group-hover:-translate-x-1 transition-transform"></i>
                        Retour au tableau de bord
                    </a>
                </div>

            </div>
        </section>

    </div>

</body>

</html>
