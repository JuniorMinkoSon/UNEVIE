<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Suivi des Véhicules en Temps Réel - UNEVIE</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        #map {
            height: calc(100vh - 80px);
            /* Pleine hauteur moins le header */
            width: 100%;
            border-radius: 0.5rem;
            z-index: 1;
        }

        .vehicle-card {
            transition: all 0.3s ease;
        }

        .vehicle-card:hover {
            background-color: rgba(209, 0, 31, 0.05);
            cursor: pointer;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-weight: 600;
        }

        .status-DISPONIBLE {
            background-color: #10B981;
            color: white;
        }

        .status-EN_COURSE {
            background-color: #3B82F6;
            color: white;
        }

        .status-HORS_SERVICE {
            background-color: #EF4444;
            color: white;
        }

        .status-EN_RETOUR {
            background-color: #F59E0B;
            color: white;
        }

        /* Sidebar flottante */
        .map-sidebar {
            position: absolute;
            top: 100px;
            left: 20px;
            width: 350px;
            max-height: calc(100vh - 140px);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        /* Mode sombre support */
        @media (prefers-color-scheme: dark) {
            .map-sidebar {
                background: rgba(30, 30, 30, 0.95);
                color: #e5e5e5;
            }
        }
    </style>
</head>

<body>

    <div layout:fragment="content" class="relative">

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Sidebar Flottante -->
        <div class="map-sidebar p-4 scrollbar-hide">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-unevie-red">
                    <i class="fas fa-satellite-dish mr-2"></i>Live Tracking
                </h2>
                <span id="connection-status" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"
                    title="Déconnecté"></span>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-2 mb-4">
                <div class="bg-gray-100 dark:bg-gray-800 p-2 rounded text-center">
                    <div class="text-xs text-gray-500">Total</div>
                    <div class="font-bold text-lg" id="total-count">0</div>
                </div>
                <div class="bg-blue-50 dark:bg-blue-900/20 p-2 rounded text-center">
                    <div class="text-xs text-blue-500">En course</div>
                    <div class="font-bold text-lg text-blue-600" id="active-count">0</div>
                </div>
                <div class="bg-green-50 dark:bg-green-900/20 p-2 rounded text-center">
                    <div class="text-xs text-green-500">Dispo</div>
                    <div class="font-bold text-lg text-green-600" id="available-count">0</div>
                </div>
            </div>

            <!-- Liste des véhicules -->
            <div id="vehicle-list" class="space-y-3">
                <div class="text-center text-gray-500 py-4">
                    <i class="fas fa-spinner fa-spin mr-2"></i>Chargement des véhicules...
                </div>
            </div>
        </div>

    </div>

    <th:block layout:fragment="scripts">
        <!-- WebSocket Libraries -->
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/dist/stomp.umd.min.js"></script>

        <!-- Leaflet JS -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

        <!-- Tracking Logic -->
        <script th:src="@{/js/tracking.js}"></script>
    </th:block>

</body>

</html>
