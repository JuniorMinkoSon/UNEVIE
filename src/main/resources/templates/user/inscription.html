<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head (title=#{register.title} + ' — UNEVIE')}"></head>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white min-h-screen flex items-center justify-center p-6 font-sans overflow-x-hidden transition-colors duration-500">

    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div
            class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/5 dark:bg-primary/20 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] bg-red-900/5 dark:bg-red-900/10 rounded-full blur-[100px]">
        </div>
    </div>

    <div class="w-full max-w-xl">
        <!-- Logo / Branding -->
        <div class="text-center mb-10 animate-fadeIn text-slate-900 dark:text-white">
            <h1 class="text-4xl font-black tracking-tighter italic uppercase leading-none">
                <span th:text="#{app.logo.text}">UNE</span><span class="text-primary"
                    th:text="#{app.logo.accent}">VIE</span>
            </h1>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-gray-400 mt-3"
                th:text="#{register.tagline}">Initialisation de votre
                Accès Privilège</p>
        </div>

        <!-- Auth Card -->
        <div
            class="bg-slate-50 dark:bg-white/5 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[3.5rem] shadow-2xl dark:shadow-none p-8 md:p-12 animate-slideUp">

            <h2 class="text-2xl font-black text-center mb-10 italic uppercase tracking-tight text-slate-900 dark:text-white"
                th:text="#{register.welcome}">Nouvelle Inscription</h2>

            <!-- ✅ Status Messages -->
            <div th:if="${error}" class="mb-8">
                <div
                    class="bg-red-500/10 border border-red-500/20 text-red-500 px-5 py-4 rounded-2xl text-[11px] font-bold uppercase flex items-center">
                    <i class="fa-solid fa-circle-exclamation mr-4"></i>
                    <span th:text="#{register.error}">Erreur lors de l'inscription</span>
                </div>
            </div>

            <form th:action="@{/register}" method="post" th:object="${user}" class="space-y-8">

                <div class="grid md:grid-cols-2 gap-8">
                    <!-- Nom -->
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                            th:text="#{register.label.name}">Nom
                            Complet</label>
                        <input type="text" th:field="*{nom}" required th:placeholder="#{register.placeholder.name}"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm">
                    </div>

                    <!-- Email -->
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                            th:text="#{register.label.email}">Email</label>
                        <input type="email" th:field="*{email}" required th:placeholder="#{register.placeholder.email}"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <!-- Password -->
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                            th:text="#{register.label.password}">Mot de
                            Passe</label>
                        <input type="password" th:field="*{password}" required
                            th:placeholder="#{register.placeholder.password}"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm">
                    </div>

                    <!-- Tel -->
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                            th:text="#{register.label.phone}">Contact
                            GSM</label>
                        <input type="tel" th:field="*{telephone}" required
                            th:placeholder="#{register.placeholder.phone}"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm">
                    </div>
                </div>

                <!-- Account Type -->
                <div
                    class="bg-slate-100 dark:bg-white/5 rounded-[2.5rem] p-8 border border-slate-200 dark:border-white/5 space-y-6">
                    <label
                        class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest text-center"
                        th:text="#{register.profile.title}">Type
                        de Profil Opérationnel</label>
                    <div class="grid grid-cols-2 gap-6">
                        <label class="cursor-pointer group">
                            <input type="radio" th:field="*{accountType}" value="CLIENT" id="typeClient"
                                class="peer hidden">
                            <div
                                class="flex flex-col items-center gap-4 p-6 rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-africanDark/50 peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary dark:peer-checked:text-white text-slate-400 dark:text-gray-600 transition-all hover:bg-slate-50 dark:hover:bg-white/10 shadow-sm dark:shadow-none">
                                <i class="fa-solid fa-user-tie text-2xl"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest"
                                    th:text="#{register.profile.client}">Client Premium</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" th:field="*{accountType}" value="PRESTATAIRE" id="radioPrestataire"
                                class="peer hidden">
                            <div
                                class="flex flex-col items-center gap-4 p-6 rounded-2xl border border-slate-200 dark:border-white/10 bg-white dark:bg-africanDark/50 peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary dark:peer-checked:text-white text-slate-400 dark:text-gray-600 transition-all hover:bg-slate-50 dark:hover:bg-white/10 shadow-sm dark:shadow-none">
                                <i class="fa-solid fa-shuttle-space text-2xl"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest"
                                    th:text="#{register.profile.provider}">Prestataire</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Spécialité Prestataire -->
                <div id="prestataireTypeDiv" class="hidden animate-fadeIn space-y-3">
                    <label
                        class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                        th:text="#{register.provider.label}">Secteur
                        d'Activité</label>
                    <div class="relative group">
                        <select th:field="*{typePrestataire}" id="selectTypePrestataire"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-slate-900 dark:text-white text-sm appearance-none cursor-pointer">
                            <option value="" disabled selected th:text="#{register.provider.placeholder}"
                                class="bg-white dark:bg-africanDark">Choisir une
                                expertise...</option>
                            <option value="CHAUFFEUR" class="bg-white dark:bg-africanDark"
                                th:text="#{register.provider.option.chauffeur}">🚖 Logistique & Transport (VTC)</option>
                            <option value="LIVREUR" class="bg-white dark:bg-africanDark"
                                th:text="#{register.provider.option.livreur}">🛵 Livraison Urbaine (Dernier Km)</option>
                            <option value="TECHNICIEN" class="bg-white dark:bg-africanDark"
                                th:text="#{register.provider.option.technicien}">🔧 Maintenance & Support Technique
                            </option>
                            <option value="AUTRE" class="bg-white dark:bg-africanDark"
                                th:text="#{register.provider.option.autre}">⭐
                                Expertise Multidisciplinaire</option>
                        </select>
                        <div
                            class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 dark:text-gray-500 group-hover:text-primary transition-colors">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    <p class="text-[9px] text-slate-400 dark:text-gray-600 font-bold uppercase tracking-widest text-center mt-4 italic"
                        th:text="#{register.provider.tagline}">
                        Devenez un maillon de la chaîne d'excellence UNEVIE</p>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-primary hover:bg-red-800 text-white font-black py-6 rounded-2xl shadow-2xl shadow-primary/40 transform transition active:scale-95 flex items-center justify-center group uppercase tracking-widest text-[10px]">
                    <span th:text="#{register.button}">Valider l'Adhésion</span>
                    <i
                        class="fa-solid fa-chevron-right ml-4 text-[8px] group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-[11px] font-bold text-slate-500 dark:text-gray-500 uppercase tracking-widest">
                    <span th:text="#{register.footer.text}">Déjà répertorié ?</span>
                    <a th:href="@{/login}"
                        class="text-slate-900 dark:text-white hover:text-primary underline decoration-primary decoration-4 underline-offset-8 transition-all"
                        th:text="#{register.footer.link}">
                        Se connecter
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer Note -->
        <p class="mt-12 text-center text-[9px] text-slate-400 dark:text-gray-600 font-bold uppercase tracking-[0.3em]"
            th:text="#{register.copyright}">
            &copy; 2025 UNEVIE — L'Afrique en Mouvement
        </p>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const radioClient = document.getElementById("typeClient");
            const radioPrestataire = document.getElementById("radioPrestataire");
            const typeDiv = document.getElementById("prestataireTypeDiv");
            const typeSelect = document.getElementById("selectTypePrestataire");

            function toggleType() {
                if (radioPrestataire.checked) {
                    typeDiv.classList.remove('hidden');
                    typeSelect.setAttribute("required", "required");
                } else {
                    typeDiv.classList.add('hidden');
                    typeSelect.removeAttribute("required");
                    typeSelect.value = "";
                }
            }

            radioClient.addEventListener("change", toggleType);
            radioPrestataire.addEventListener("change", toggleType);
            toggleType();
        });
    </script>

</body>

</html>
