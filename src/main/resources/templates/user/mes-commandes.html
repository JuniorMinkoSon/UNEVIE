<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head (title=#{orders.title} + ' — UNEVIE')}"></head>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white font-sans selection:bg-primary selection:text-white overflow-x-hidden transition-colors duration-500">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-6 pt-32 pb-24 transition-colors duration-500">

        <!-- Background Decor -->
        <div
            class="absolute top-0 right-0 w-[400px] h-[400px] bg-primary/5 dark:bg-primary/5 rounded-full blur-[100px] -z-10">
        </div>

        <div class="mb-12 animate-fadeIn text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter mb-4 italic text-slate-900 dark:text-white">
                <span th:text="#{orders.title.part1 ?: 'Mon Espace'}">Mon Espace</span> <span
                    class="text-primary italic" th:text="#{orders.subtitle ?: 'Commandes'}">Commandes</span>
            </h1>
            <p class="text-slate-500 dark:text-gray-400 font-medium" th:text="#{orders.tagline}">Suivez en temps réel
                l'évolution de vos
                demandes et votre historique
                d'achat.</p>
        </div>

        <!-- ORDER LIST -->
        <div th:if="${#lists.isEmpty(commandes)}"
            class="text-center py-32 bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-[3rem] animate-slideUp shadow-2xl dark:shadow-none">
            <div class="mb-8 text-slate-300 dark:text-gray-700">
                <div
                    class="w-24 h-24 bg-white dark:bg-white/5 rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner">
                    <i class="fa-solid fa-cart-shopping opacity-20"></i>
                </div>
            </div>
            <p class="text-2xl font-black text-slate-400 dark:text-gray-400 mb-8" th:text="#{orders.empty.text}">Votre
                panier historique est
                vide.</p>
            <a th:href="@{/projets}"
                class="inline-flex items-center gap-3 bg-primary hover:bg-red-800 text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 shadow-xl shadow-primary/20 group">
                <span th:text="#{orders.empty.btn}">Découvrir nos solutions</span>
                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </a>
        </div>

        <div th:if="${!#lists.isEmpty(commandes)}"
            class="bg-white dark:bg-white/5 backdrop-blur-xl rounded-[2.5rem] border border-slate-200 dark:border-white/10 overflow-hidden shadow-2xl dark:shadow-none animate-slideUp">

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 dark:divide-white/5">
                    <thead class="bg-slate-50 dark:bg-white/[0.02]">
                        <tr>
                            <th class="px-8 py-6 text-left text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.product}">
                                Produit</th>
                            <th class="px-8 py-6 text-left text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.date}">
                                Date</th>
                            <th class="px-8 py-6 text-left text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.total}">
                                Total</th>
                            <th class="px-8 py-6 text-left text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.payment}">
                                Paiement</th>
                            <th class="px-8 py-6 text-left text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.status}">
                                Statut</th>
                            <th class="px-8 py-6 text-right text-[10px] font-black text-slate-400 dark:text-gray-400 uppercase tracking-widest"
                                th:text="#{orders.table.action}">
                                Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-white/5">
                        <tr th:each="c : ${commandes}" class="hover:bg-slate-50 dark:hover:bg-white/[0.02] transition">
                            <td class="px-8 py-6 whitespace-nowrap">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="h-14 w-14 rounded-2xl overflow-hidden bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 shrink-0 shadow-sm">
                                        <img th:if="${c.produit.imageUrl}"
                                            th:src="@{'/uploads/' + ${c.produit.imageUrl}}"
                                            class="h-full w-full object-cover">
                                        <div th:unless="${c.produit.imageUrl}"
                                            class="h-full w-full flex items-center justify-center text-slate-300 dark:text-gray-700">
                                            <i class="fa-solid fa-image text-xl"></i>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="text-sm font-black text-slate-900 dark:text-white"
                                            th:text="${c.produit.nom}"></div>
                                        <div class="text-[10px] font-bold text-slate-500 dark:text-gray-500 uppercase tracking-wider"
                                            th:text="#{orders.table.quantity} + ': ' + (${c.quantite} ?: 1)"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6 whitespace-nowrap">
                                <span class="text-xs font-bold text-slate-600 dark:text-gray-400"
                                    th:text="${#temporals.format(c.dateCommande, 'dd MMM yyyy')}"></span>
                                <div class="text-[10px] text-slate-400 dark:text-gray-600 font-medium"
                                    th:text="${#temporals.format(c.dateCommande, 'HH:mm')}"></div>
                            </td>
                            <td class="px-8 py-6 whitespace-nowrap">
                                <div class="text-sm font-black text-primary"
                                    th:text="${#numbers.formatDecimal(c.total, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">
                                </div>
                            </td>
                            <td class="px-8 py-6 whitespace-nowrap">
                                <div class="flex flex-col gap-1">
                                    <span
                                        class="text-[10px] font-black text-slate-900 dark:text-white uppercase tracking-tighter"
                                        th:text="${c.modePaiement}"></span>
                                    <span class="text-[9px] text-slate-500 dark:text-gray-500 font-bold uppercase"
                                        th:text="${c.operateur}"></span>
                                </div>
                            </td>
                            <td class="px-8 py-6 whitespace-nowrap">
                                <!-- Status Badges -->
                                <span th:if="${c.statut == 'EN_ATTENTE'}"
                                    class="px-4 py-1.5 inline-flex text-[9px] font-black uppercase tracking-widest rounded-full bg-yellow-500/10 text-yellow-600 dark:text-yellow-500 border border-yellow-500/20"
                                    th:text="#{orders.status.pending}">
                                    En attente
                                </span>
                                <span th:if="${c.statut == 'VALIDEE'}"
                                    class="px-4 py-1.5 inline-flex text-[9px] font-black uppercase tracking-widest rounded-full bg-green-500/10 text-green-600 dark:text-green-500 border border-green-500/20"
                                    th:text="#{orders.status.validated}">
                                    Validée
                                </span>
                                <span th:if="${c.statut == 'LIVREE'}"
                                    class="px-4 py-1.5 inline-flex text-[9px] font-black uppercase tracking-widest rounded-full bg-blue-500/10 text-blue-600 dark:text-blue-500 border border-blue-500/20"
                                    th:text="#{orders.status.delivered}">
                                    Livrée
                                </span>
                                <span th:if="${c.statut == 'ANNULEE'}"
                                    class="px-4 py-1.5 inline-flex text-[9px] font-black uppercase tracking-widest rounded-full bg-red-500/10 text-red-600 dark:text-red-500 border border-red-500/20"
                                    th:text="#{orders.status.cancelled}">
                                    Annulée
                                </span>
                            </td>
                            <td class="px-8 py-6 whitespace-nowrap text-right">
                                <a th:if="${c.prestataire != null}" th:href="@{/commande/suivi/{id}(id=${c.id})}"
                                    class="inline-flex items-center gap-2 px-5 py-2.5 bg-slate-100 dark:bg-white/5 hover:bg-primary text-slate-900 dark:text-white hover:text-white text-[10px] font-black uppercase tracking-widest rounded-xl border border-slate-200 dark:border-white/10 hover:border-primary transition-all active:scale-95 group shadow-sm">
                                    <i class="fa-solid fa-map-location-dot group-hover:animate-bounce"></i>
                                    <span th:text="#{orders.action.track}">Suivre</span>
                                </a>
                                <span th:unless="${c.prestataire != null}"
                                    class="text-[9px] font-bold text-slate-400 dark:text-gray-600 uppercase tracking-widest italic"
                                    th:text="#{orders.action.preparing}">
                                    En préparation
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
