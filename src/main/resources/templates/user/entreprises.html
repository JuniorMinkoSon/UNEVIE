<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head (title='Entreprises Partenaires — UNEVIE')}">
</head>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white font-sans selection:bg-primary selection:text-white overflow-x-hidden transition-colors duration-500">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- HERO SECTION -->
    <section
        class="relative pt-44 pb-32 overflow-hidden border-b border-slate-200 dark:border-white/5 transition-colors duration-500">
        <div class="absolute inset-0 z-0">
            <img src="/images/Whresidencesassinie.jpeg"
                class="w-full h-full object-cover grayscale opacity-10 dark:opacity-20 scale-105">
            <div
                class="absolute inset-0 bg-gradient-to-b from-white via-white/80 to-white dark:from-africanDark dark:via-africanDark/80 dark:to-africanDark">
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 relative z-10 text-center animate-fadeIn">
            <div
                class="inline-flex items-center gap-3 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 px-6 py-2 rounded-full mb-8">
                <i class="fa-solid fa-building text-primary text-xs"></i>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-gray-400">
                    Partenaires EasyService
                </span>
            </div>
            <h1
                class="text-5xl md:text-8xl font-black tracking-tighter mb-8 italic uppercase leading-tight text-slate-900 dark:text-white">
                Nos <span class="text-primary italic">Entreprises</span>
            </h1>
            <p
                class="max-w-3xl mx-auto text-slate-600 dark:text-gray-400 text-lg md:text-xl font-medium leading-relaxed mb-12">
                Découvrez notre réseau de partenaires certifiés dans toute la ville
            </p>
        </div>
    </section>

    <!-- FILTRES -->
    <section class="sticky top-20 z-40 bg-white dark:bg-africanDark border-b border-slate-200 dark:border-white/5 py-6">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <!-- Filtres par catégorie -->
                <div class="flex flex-wrap gap-3">
                    <button onclick="filterByCategorie(null)"
                        class="filter-btn px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wide transition-all active"
                        data-categorie="">
                        <i class="fas fa-th-large mr-2"></i>Tout
                    </button>
                    <button onclick="filterByCategorie('VEHICULE')"
                        class="filter-btn px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wide transition-all"
                        data-categorie="VEHICULE">
                        <i class="fas fa-car mr-2"></i>Véhicules
                    </button>
                    <button onclick="filterByCategorie('RESIDENCE')"
                        class="filter-btn px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wide transition-all"
                        data-categorie="RESIDENCE">
                        <i class="fas fa-home mr-2"></i>Résidences
                    </button>
                    <button onclick="filterByCategorie('EVENEMENT')"
                        class="filter-btn px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wide transition-all"
                        data-categorie="EVENEMENT">
                        <i class="fas fa-calendar-alt mr-2"></i>Événements
                    </button>
                    <button onclick="filterByCategorie('TRAITEUR')"
                        class="filter-btn px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wide transition-all"
                        data-categorie="TRAITEUR">
                        <i class="fas fa-utensils mr-2"></i>Traiteurs
                    </button>
                </div>

                <!-- Filtre par quartier -->
                <div class="relative">
                    <select id="quartierFilter" onchange="applyFilters()"
                        class="appearance-none bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 px-6 py-3 pr-12 rounded-xl font-bold text-sm uppercase tracking-wide cursor-pointer transition-all focus:outline-none focus:border-primary">
                        <option value="">Tous les quartiers</option>
                        <option value="1">Cocody</option>
                        <option value="2">Yopougon</option>
                        <option value="3">Plateau</option>
                        <option value="4">Marcory</option>
                        <option value="5">Treichville</option>
                    </select>
                    <i
                        class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary"></i>
                </div>
            </div>
        </div>
    </section>

    <!-- LISTE DES ENTREPRISES -->
    <section class="max-w-7xl mx-auto px-6 py-20">
        <div id="entreprisesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Les entreprises seront chargées ici via JavaScript -->
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i>
                <p class="text-slate-500 dark:text-gray-400 font-medium">Chargement des entreprises...</p>
            </div>
        </div>

        <!-- Message si aucun résultat -->
        <div id="noResults" class="hidden col-span-full text-center py-20">
            <i class="fas fa-search text-6xl text-slate-300 dark:text-gray-600 mb-4"></i>
            <p class="text-slate-500 dark:text-gray-400 font-medium text-lg">
                Aucune entreprise trouvée pour ces critères
            </p>
        </div>
    </section>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <style>
        .filter-btn {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #64748b;
            border: 2px solid transparent;
        }

        .dark .filter-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            color: #94a3b8;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d1001f 0%, #a00018 100%);
            color: white;
            border-color: #d1001f;
            box-shadow: 0 10px 30px rgba(209, 0, 31, 0.3);
        }

        .entreprise-card {
            transition: all 0.3s ease;
        }

        .entreprise-card:hover {
            transform: translateY(-8px);
        }
    </style>

    <script>
        let currentCategorie = null;
        let currentQuartier = null;

        // Charger les entreprises au chargement de la page
        document.addEventListener('DOMContentLoaded', function () {
            loadEntreprises();
        });

        function filterByCategorie(categorie) {
            currentCategorie = categorie;

            // Mettre à jour l'état actif des boutons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.filter-btn').classList.add('active');

            applyFilters();
        }

        function applyFilters() {
            currentQuartier = document.getElementById('quartierFilter').value;
            loadEntreprises();
        }

        function loadEntreprises() {
            const grid = document.getElementById('entreprisesGrid');
            const noResults = document.getElementById('noResults');

            // Construire l'URL avec les filtres
            let url = '/api/entreprises';
            const params = new URLSearchParams();

            if (currentCategorie) {
                params.append('categorie', currentCategorie);
            }
            if (currentQuartier) {
                params.append('quartier', currentQuartier);
            }

            if (params.toString()) {
                url += '?' + params.toString();
            }

            // Afficher le loader
            grid.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i>
                    <p class="text-slate-500 dark:text-gray-400 font-medium">Chargement des entreprises...</p>
                </div>
            `;
            noResults.classList.add('hidden');

            // Charger les données
            fetch(url)
                .then(response => response.json())
                .then(entreprises => {
                    if (entreprises.length === 0) {
                        grid.innerHTML = '';
                        noResults.classList.remove('hidden');
                        return;
                    }

                    grid.innerHTML = entreprises.map(e => createEntrepriseCard(e)).join('');
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                            <p class="text-slate-500 dark:text-gray-400 font-medium">
                                Erreur de chargement. Veuillez réessayer.
                            </p>
                        </div>
                    `;
                });
        }

        function createEntrepriseCard(entreprise) {
            const categorieIcons = {
                'VEHICULE': 'fa-car',
                'RESIDENCE': 'fa-home',
                'EVENEMENT': 'fa-calendar-alt',
                'TRAITEUR': 'fa-utensils',
                'AUTRE': 'fa-briefcase'
            };

            const icon = categorieIcons[entreprise.categorie] || 'fa-briefcase';
            const contratBadge = entreprise.contratActif ?
                '<span class="inline-flex items-center gap-2 bg-green-500/10 text-green-600 dark:text-green-400 px-3 py-1 rounded-full text-xs font-black uppercase"><i class="fas fa-check-circle"></i>Partenaire EasyService</span>' :
                '';

            return `
                <div class="entreprise-card group bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-[2.5rem] overflow-hidden hover:bg-white dark:hover:bg-white/[0.08] hover:border-primary/30 shadow-xl dark:shadow-none">
                    <div class="relative h-48 overflow-hidden bg-gradient-to-br from-primary/10 to-primary/5">
                        ${entreprise.logo ?
                    `<img src="${entreprise.logo}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-1000">` :
                    `<div class="w-full h-full flex items-center justify-center">
                                <i class="fas ${icon} text-6xl text-primary/30"></i>
                            </div>`
                }
                        <div class="absolute top-4 right-4">
                            <div class="w-12 h-12 bg-white dark:bg-africanDark rounded-xl flex items-center justify-center text-primary text-xl shadow-xl">
                                <i class="fas ${icon}"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <h3 class="text-xl font-black mb-2 tracking-tight uppercase group-hover:text-primary transition-colors">
                            ${entreprise.nom}
                        </h3>
                        
                        ${contratBadge}
                        
                        <p class="text-slate-500 dark:text-gray-400 text-sm font-medium leading-relaxed mt-3 line-clamp-2">
                            ${entreprise.description || 'Description non disponible'}
                        </p>
                        
                        <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-200 dark:border-white/10">
                            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 dark:text-gray-500">
                                <i class="fas fa-map-marker-alt text-primary"></i>
                                <span>${entreprise.quartierNom || 'Non spécifié'}</span>
                            </div>
                            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 dark:text-gray-500">
                                <i class="fas fa-box text-primary"></i>
                                <span>${entreprise.nombreProduits || 0} services</span>
                            </div>
                        </div>
                        
                        <a href="/entreprise/${entreprise.id}" 
                            class="mt-4 w-full block text-center bg-primary hover:bg-red-800 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest text-xs transition-all active:scale-95">
                            Voir les services <i class="fas fa-arrow-right ml-2"></i>
                        </a>
                    </div>
                </div>
            `;
        }
    </script>

</body>

</html>
