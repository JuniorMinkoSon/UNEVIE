<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head (title=#{confirmation.title} + ' — UNEVIE')}"></head>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white font-sans selection:bg-primary selection:text-white overflow-x-hidden transition-colors duration-500">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- MAIN CONTENT -->
    <section
        class="max-w-7xl mx-auto px-6 py-44 flex flex-col items-center justify-center text-center animate-fadeIn transition-colors duration-500">

        <!-- Success Icon -->
        <div class="relative mb-12">
            <div class="absolute -inset-10 bg-primary/20 rounded-full blur-3xl animate-pulse"></div>
            <div
                class="relative w-32 h-32 bg-primary rounded-[2.5rem] flex items-center justify-center text-white text-5xl shadow-2xl shadow-primary/40 animate-slideUp">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>

        <!-- Success Text -->
        <div class="space-y-6 animate-slideUp" style="animation-delay: 100ms;">
            <span class="text-primary font-black uppercase tracking-[0.3em] text-[10px]"
                th:text="#{confirmation.badge}">Succès Opérationnel</span>
            <h1
                class="text-5xl md:text-8xl font-black italic uppercase tracking-tighter leading-none mb-4 text-slate-900 dark:text-white">
                <span th:text="#{confirmation.heading.part1}">Merci pour</span> <br><span
                    th:text="#{confirmation.heading.part2.prefix ?: ''}">votre</span> <span class="text-primary"
                    th:text="#{confirmation.heading.part2}">Confiance</span>
            </h1>
            <p class="max-w-xl mx-auto text-slate-500 dark:text-gray-400 text-lg font-medium leading-relaxed"
                th:text="#{confirmation.description}">
                Votre requête a été transmise avec succès à notre cellule logistique. Un responsable opérationnel
                prendra contact avec vous dans les plus brefs délais pour finaliser les détails.
            </p>
        </div>

        <!-- Actions -->
        <div class="mt-16 flex flex-wrap justify-center gap-6 animate-slideUp" style="animation-delay: 200ms;">
            <a th:href="@{/}"
                class="bg-primary hover:bg-red-800 text-white px-12 py-6 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all transform active:scale-95 shadow-2xl shadow-primary/40"
                th:text="#{confirmation.btn.home}">
                Retour à l'Espace Client
            </a>
            <a th:href="@{/mes-commandes}"
                class="bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 text-slate-900 dark:text-white border border-slate-200 dark:border-white/10 px-10 py-6 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all"
                th:text="#{confirmation.btn.orders}">
                Suivre mes Commandes
            </a>
        </div>

    </section>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
