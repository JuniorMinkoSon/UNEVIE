<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head (title=#{checkout.title} + ' — UNEVIE')}"></head>

<style>
    .operator-card.active {
        border-color: #ef4444;
        /* primary red */
        background-color: rgba(239, 68, 68, 0.1);
        box-shadow: 0 0 0 2px #ef4444;
    }
</style>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white font-sans selection:bg-primary selection:text-white overflow-x-hidden transition-colors duration-500">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="max-w-4xl mx-auto px-6 py-32 animate-fadeIn transition-colors duration-500">

        <!-- Header Section -->
        <div class="mb-16 text-center">
            <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter text-slate-900 dark:text-white"
                th:text="#{checkout.title}">
                Finaliser la Commande</h1>
            <div class="mt-8 flex items-center justify-center gap-4">
                <div id="step-1-indicator" class="flex items-center gap-3 transition-opacity">
                    <div
                        class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center font-black text-sm text-white">
                        1
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-900 dark:text-white"
                        th:text="#{checkout.stepper.info}">Coordonnées</span>
                </div>
                <div class="w-12 h-px bg-slate-200 dark:bg-white/10 relative overflow-hidden">
                    <div id="progress-bar" class="absolute inset-0 bg-primary w-0 transition-all duration-500"></div>
                </div>
                <div id="step-2-indicator" class="flex items-center gap-3 opacity-50 transition-opacity">
                    <div
                        class="w-10 h-10 rounded-xl bg-slate-200 dark:bg-white/10 flex items-center justify-center font-black text-sm text-slate-500 dark:text-white">
                        2
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-900 dark:text-white"
                        th:text="#{checkout.stepper.payment}">Paiement</span>
                </div>
            </div>
        </div>

        <!-- Form Card -->
        <div
            class="bg-slate-50 dark:bg-white/5 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[3rem] shadow-2xl dark:shadow-none p-8 md:p-12">

            <form th:action="@{/checkout/save}" method="post" id="checkout-form">

                <!-- Hidden fields for geoloc & product -->
                <input type="hidden" name="latitude" id="hidden-lat">
                <input type="hidden" name="longitude" id="hidden-lng">
                <input type="hidden" name="operateur" id="hidden-operateur">
                <!-- If the controller expects a product ID for direct checkout -->
                <input th:if="${produit}" type="hidden" name="produitId" th:value="${produit.id}">

                <!-- STEP 1: INFO -->
                <div id="step-1" class="space-y-8">

                    <div class="grid md:grid-cols-2 gap-8">
                        <!-- Nom -->
                        <div class="space-y-3">
                            <label
                                class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                                th:text="#{checkout.form.name.label}">Nom Complet</label>
                            <input type="text" name="nomClient" id="input-nom" required
                                th:placeholder="#{checkout.form.name.placeholder}"
                                th:value="${#authentication.principal != 'anonymousUser' ? #authentication.principal.nom : ''}"
                                class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm shadow-sm dark:shadow-none">
                        </div>

                        <!-- Téléphone -->
                        <div class="space-y-3">
                            <label
                                class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                                th:text="#{checkout.form.phone.label}">Téléphone</label>
                            <input type="tel" name="telephone" id="input-tel" required
                                th:placeholder="#{checkout.form.phone.placeholder}"
                                th:value="${#authentication.principal != 'anonymousUser' ? #authentication.principal.telephone : ''}"
                                class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm shadow-sm dark:shadow-none">
                        </div>
                    </div>

                    <!-- Localisation -->
                    <div class="space-y-3">
                        <div class="flex justify-between items-center ml-1">
                            <label
                                class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest"
                                th:text="#{checkout.form.location.label}">Lieu de Livraison</label>
                            <button type="button" id="btnGetUserLocation"
                                class="text-[9px] font-black text-primary uppercase tracking-widest hover:text-slate-900 dark:hover:text-white transition-colors flex items-center gap-2">
                                <i class="fa-solid fa-location-crosshairs"></i>
                                <span th:text="#{checkout.form.location.gps}">Ma Position GPS</span>
                            </button>
                        </div>
                        <div id="gpsUserStatus" class="hidden"></div>
                        <input type="text" name="adresse" id="input-loc" required
                            th:placeholder="#{checkout.form.location.placeholder}"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm shadow-sm dark:shadow-none">
                    </div>

                    <!-- Payment Mode Selection -->
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                            th:text="#{checkout.form.payment.label}">Mode de Règlement</label>
                        <select name="typePaiement" id="payment-select"
                            class="w-full px-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-slate-900 dark:text-white text-sm appearance-none cursor-pointer shadow-sm dark:shadow-none">
                            <option value="TELEPHONE" class="bg-white dark:bg-africanDark"
                                th:text="#{checkout.form.payment.mobile}">
                                Mobile Money (Wave, Orange, MTN, Moov)</option>
                            <option value="ESPECE" class="bg-white dark:bg-africanDark"
                                th:text="#{checkout.form.payment.cash}">
                                Paiement à la Livraison (Espèces)</option>
                        </select>
                    </div>

                    <!-- Buttons -->
                    <button type="button" id="btn-next"
                        class="w-full bg-primary hover:bg-red-800 text-white font-black py-6 rounded-2xl shadow-2xl shadow-primary/40 transform transition active:scale-95 flex items-center justify-center group uppercase tracking-widest text-[10px]">
                        <span th:text="#{checkout.form.next}">Étape Suivante</span>
                        <i
                            class="fa-solid fa-chevron-right ml-4 text-[8px] group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>

                <!-- STEP 2: PAYMENT DETAILS -->
                <div id="step-2" class="hidden space-y-10 animate-fadeIn">

                    <!-- Mobile Money Options -->
                    <div id="payment-mobile" class="space-y-8">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <!-- WAVE -->
                            <button type="button"
                                class="operator-card p-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl shadow-sm dark:shadow-none transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col items-center gap-3 group"
                                data-op="Wave">
                                <div class="w-12 h-12 bg-white rounded-xl p-2 shadow-inner">
                                    <img src="https://static.wave.com/brand/wave-logo.svg" alt="Wave"
                                        class="w-full h-full object-contain">
                                </div>
                                <span
                                    class="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white">Wave</span>
                            </button>
                            <!-- ORANGE -->
                            <button type="button"
                                class="operator-card p-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl shadow-sm dark:shadow-none transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col items-center gap-3 group"
                                data-op="Orange">
                                <div class="w-12 h-12 bg-[#FF7900] rounded-xl p-2 shadow-inner">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Orange_logo.svg/1024px-Orange_logo.svg.png"
                                        alt="Orange" class="w-full h-full object-contain">
                                </div>
                                <span
                                    class="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white">Orange</span>
                            </button>
                            <!-- MTN -->
                            <button type="button"
                                class="operator-card p-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl shadow-sm dark:shadow-none transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col items-center gap-3 group"
                                data-op="MTN">
                                <div class="w-12 h-12 bg-[#FFCC00] rounded-xl p-2 shadow-inner">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/MTN_Logo.svg/2048px-MTN_Logo.svg.png"
                                        alt="MTN" class="w-full h-full object-contain">
                                </div>
                                <span
                                    class="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white">MTN</span>
                            </button>
                            <!-- MOOV -->
                            <button type="button"
                                class="operator-card p-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl shadow-sm dark:shadow-none transition-all hover:bg-slate-100 dark:hover:bg-white/10 flex flex-col items-center gap-3 group"
                                data-op="Moov">
                                <div class="w-12 h-12 bg-[#00519E] rounded-xl p-2 shadow-inner">
                                    <img src="https://upload.wikimedia.org/wikipedia/fr/c/cf/Moov_Africa_logo.png"
                                        alt="Moov"
                                        class="w-full h-full object-contain dark:grayscale dark:brightness-200">
                                </div>
                                <span
                                    class="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white">Moov</span>
                            </button>
                        </div>

                        <!-- Number Input -->
                        <div id="mobile-number-input"
                            class="hidden bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 p-8 rounded-[2rem] text-center animate-pulse-once">
                            <p
                                class="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-400 mb-6">
                                <span th:text="#{checkout.payment.mobile.title}">Entrez votre numéro pour payer
                                    via</span>
                                <span id="display-op" class="text-primary"></span>
                            </p>
                            <input type="tel" name="mobileNumber" id="mobile-money-num"
                                th:placeholder="#{checkout.payment.mobile.number}"
                                class="max-w-xs mx-auto w-full bg-transparent border-b-2 border-slate-200 dark:border-white/10 focus:border-primary text-center px-4 py-3 text-2xl font-black tracking-[0.3em] outline-none transition-all text-slate-900 dark:text-white">

                            <div class="mt-8 flex items-center justify-center gap-3 text-slate-400 dark:text-gray-600">
                                <i class="fa-solid fa-shield-halved text-xs"></i>
                                <span class="text-[9px] font-bold uppercase tracking-widest"
                                    th:text="#{checkout.payment.mobile.secure}">Paiement sécurisé et instantané.</span>
                            </div>
                        </div>

                        <button type="submit" id="btn-pay" disabled
                            class="w-full bg-green-600 hover:bg-green-700 disabled:bg-slate-200 dark:disabled:bg-white/5 disabled:text-slate-400 dark:disabled:text-gray-700 text-white font-black py-6 rounded-2xl shadow-2xl transition-all flex items-center justify-center group uppercase tracking-widest text-[10px]">
                            <i class="fa-solid fa-lock mr-4 text-[10px]"></i>
                            <span th:text="#{checkout.payment.mobile.button}">Payer et Valider</span>
                        </button>
                    </div>

                    <!-- Cash Option -->
                    <div id="payment-cash" class="hidden text-center space-y-8 animate-fadeIn">
                        <div
                            class="w-20 h-20 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-3xl flex items-center justify-center mx-auto text-primary text-3xl shadow-sm dark:shadow-none">
                            <i class="fa-solid fa-hand-holding-dollar"></i>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-xl font-black italic uppercase tracking-tight text-slate-900 dark:text-white"
                                th:text="#{checkout.payment.cash.title}">Paiement à la livraison</h3>
                            <p class="text-xs font-medium text-slate-500 dark:text-gray-500 max-w-sm mx-auto leading-relaxed"
                                th:text="#{checkout.payment.cash.description}">
                                Vous réglerez le montant total en espèces directement lors de la livraison ou à la fin
                                du service.
                            </p>
                        </div>
                        <button type="submit"
                            class="w-full bg-primary hover:bg-red-800 text-white font-black py-6 rounded-2xl shadow-2xl shadow-primary/40 transition-all flex items-center justify-center group uppercase tracking-widest text-[10px]">
                            <span th:text="#{checkout.payment.cash.button}">Confirmer la commande</span>
                        </button>
                    </div>

                    <!-- Back Button -->
                    <div class="pt-4 text-center">
                        <button type="button" id="btn-back"
                            class="group text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-gray-600 hover:text-slate-900 dark:hover:text-white transition-all inline-flex items-center gap-3">
                            <i
                                class="fa-solid fa-chevron-left text-[8px] group-hover:-translate-x-1 transition-transform"></i>
                            <span th:text="#{checkout.payment.back}">Retour</span>
                        </button>
                    </div>
                </div>

            </form>

        </div>
    </section>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", () => {
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');
            const btnNext = document.getElementById('btn-next');
            const btnBack = document.getElementById('btn-back');
            const progressBar = document.getElementById('progress-bar');
            const step2Indicator = document.getElementById('step-2-indicator');

            const paymentSelect = document.getElementById('payment-select');
            const paymentMobile = document.getElementById('payment-mobile');
            const paymentCash = document.getElementById('payment-cash');

            const operatorCards = document.querySelectorAll('.operator-card');
            const hiddenOp = document.getElementById('hidden-operateur');
            const mobileInputArea = document.getElementById('mobile-number-input');
            const displayOp = document.getElementById('display-op');
            const mobileMoneyNum = document.getElementById('mobile-money-num');
            const btnPay = document.getElementById('btn-pay');

            btnNext.addEventListener('click', () => {
                const inputNom = document.getElementById('input-nom');
                const inputTel = document.getElementById('input-tel');
                const inputLoc = document.getElementById('input-loc');

                if (!inputNom.value || !inputTel.value || !inputLoc.value) {
                    alert(/*[[#{checkout.form.error.required}]]*/ "Veuillez remplir les informations obligatoires.");
                    return;
                }

                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                step2Indicator.classList.remove('opacity-50');
                step2Indicator.querySelector('div').classList.add('bg-primary');
                step2Indicator.querySelector('div').classList.remove('bg-white/10');
                step2Indicator.querySelector('div').classList.remove('bg-slate-200');
                progressBar.classList.add('w-full');

                if (paymentSelect.value === 'TELEPHONE') {
                    paymentMobile.classList.remove('hidden');
                    paymentCash.classList.add('hidden');
                } else {
                    paymentCash.classList.remove('hidden');
                    paymentMobile.classList.add('hidden');
                }
            });

            btnBack.addEventListener('click', () => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                step2Indicator.classList.add('opacity-50');
                step2Indicator.querySelector('div').classList.remove('bg-primary');
                step2Indicator.querySelector('div').classList.add('dark:bg-white/10');
                step2Indicator.querySelector('div').classList.add('bg-slate-200');
                progressBar.classList.remove('w-full');
            });

            operatorCards.forEach(card => {
                card.addEventListener('click', () => {
                    operatorCards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    const op = card.getAttribute('data-op');
                    hiddenOp.value = op;
                    displayOp.textContent = op;
                    mobileInputArea.classList.remove('hidden');
                    mobileMoneyNum.focus();
                    validateStep2();
                });
            });

            mobileMoneyNum.addEventListener('input', validateStep2);

            function validateStep2() {
                // Ensure at least 8 digits for phone number
                btnPay.disabled = !(hiddenOp.value && mobileMoneyNum.value.trim().length >= 8);
            }

            // GEOLOCALISATION
            const btnGetLocation = document.getElementById('btnGetUserLocation');
            const gpsStatusDiv = document.getElementById('gpsUserStatus');
            const inputLoc = document.getElementById('input-loc');
            const hiddenLat = document.getElementById('hidden-lat');
            const hiddenLng = document.getElementById('hidden-lng');

            if (btnGetLocation) {
                btnGetLocation.addEventListener('click', function () {
                    if (!navigator.geolocation) {
                        gpsStatusDiv.textContent = '❌ Géolocalisation non supportée';
                        gpsStatusDiv.className = 'block mb-4 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest bg-red-500/10 text-red-500 border border-red-500/20';
                        gpsStatusDiv.classList.remove('hidden');
                        return;
                    }

                    gpsStatusDiv.textContent = '📍 Recherche satellite en cours...';
                    gpsStatusDiv.className = 'block mb-4 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest bg-slate-100 dark:bg-white/5 text-primary border border-slate-200 dark:border-white/10 animate-pulse';
                    gpsStatusDiv.classList.remove('hidden');
                    btnGetLocation.disabled = true;

                    navigator.geolocation.getCurrentPosition(
                        function (position) {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;

                            hiddenLat.value = lat.toFixed(6);
                            hiddenLng.value = lng.toFixed(6);
                            inputLoc.value = `📍 GPS: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

                            gpsStatusDiv.textContent = `✅ Position verrouillée ! (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
                            gpsStatusDiv.className = 'block mb-4 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest bg-green-500/10 text-green-500 border border-green-500/20';

                            setTimeout(() => {
                                gpsStatusDiv.classList.add('hidden');
                            }, 3000);

                            btnGetLocation.disabled = false;
                        },
                        function (error) {
                            let errorMsg = 'Erreur de géolocalisation';
                            switch (error.code) {
                                case error.PERMISSION_DENIED: errorMsg = '❌ Accès refusé'; break;
                                case error.POSITION_UNAVAILABLE: errorMsg = '❌ Position non disponible'; break;
                                case error.TIMEOUT: errorMsg = '❌ Temps expiré'; break;
                            }
                            gpsStatusDiv.textContent = errorMsg;
                            gpsStatusDiv.className = 'block mb-4 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest bg-red-500/10 text-red-500 border border-red-500/20';
                            btnGetLocation.disabled = false;
                        },
                        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                    );
                });
            }
        });
    </script>
</body>

</html>
