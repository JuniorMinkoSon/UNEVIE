<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head (title=#{login.title} + ' — UNEVIE')}"></head>

<body
    class="bg-white dark:bg-africanDark text-slate-900 dark:text-white min-h-screen flex items-center justify-center p-6 font-sans overflow-hidden transition-colors duration-500">

    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div
            class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/5 dark:bg-primary/20 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] bg-red-900/5 dark:bg-red-900/10 rounded-full blur-[100px]">
        </div>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo / Branding -->
        <div class="text-center mb-10 animate-fadeIn text-slate-900 dark:text-white">
            <h1 class="text-4xl font-black tracking-tighter italic uppercase">
                <span th:text="#{app.logo.text}">UNE</span><span class="text-primary"
                    th:text="#{app.logo.accent}">VIE</span>
            </h1>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-gray-400 mt-3"
                th:text="#{login.tagline}">
                Écosystème de Services Premium</p>
        </div>

        <!-- Auth Card -->
        <div
            class="bg-slate-50 dark:bg-white/5 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[3rem] shadow-2xl dark:shadow-none p-10 animate-slideUp">
            <h2 class="text-2xl font-black text-center mb-10 italic uppercase tracking-tight text-slate-900 dark:text-white"
                th:text="#{login.welcome}">Ravi de vous revoir</h2>

            <!-- ✅ Messages Status -->
            <div th:if="${param.error}" class="mb-8">
                <div
                    class="bg-red-500/10 border border-red-500/20 text-red-500 px-5 py-4 rounded-2xl text-[11px] font-bold uppercase flex items-center">
                    <i class="fa-solid fa-circle-exclamation mr-4"></i>
                    <span th:text="#{login.error}">Email ou mot de passe incorrect.</span>
                </div>
            </div>

            <div th:if="${param.logout}" class="mb-8">
                <div
                    class="bg-green-500/10 border border-green-500/20 text-green-600 px-5 py-4 rounded-2xl text-[11px] font-bold uppercase flex items-center">
                    <i class="fa-solid fa-circle-check mr-4"></i>
                    <span th:text="#{login.logout_success}">Déconnexion réussie.</span>
                </div>
            </div>

            <div th:if="${param.success}" class="mb-8">
                <div
                    class="bg-primary/10 border border-primary/20 text-slate-900 dark:text-white px-5 py-4 rounded-2xl text-[11px] font-bold uppercase flex items-center">
                    <i class="fa-solid fa-star mr-4 text-primary"></i>
                    <span th:text="#{login.success}">Inscription réussie ! Connectez-vous.</span>
                </div>
            </div>

            <!-- ✅ Formulaire -->
            <form th:action="@{/login}" method="post" class="space-y-8">
                <!-- Input Email -->
                <div class="space-y-3">
                    <label for="email"
                        class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest ml-1"
                        th:text="#{login.email_label}">Email Professionnel</label>
                    <div class="group relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-slate-400 dark:text-gray-500 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-envelope text-xs"></i>
                        </div>
                        <input type="email" id="email" name="email"
                            class="w-full pl-14 pr-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm"
                            required th:placeholder="#{login.email}">
                    </div>
                </div>

                <!-- Input Password -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center ml-1">
                        <label for="password"
                            class="block text-[10px] font-black text-slate-500 dark:text-gray-500 uppercase tracking-widest"
                            th:text="#{login.password_label}">Mot de passe</label>
                        <a href="#"
                            class="text-[9px] font-black text-primary uppercase tracking-widest hover:text-slate-900 dark:hover:text-white transition-colors"
                            th:text="#{login.forgot_password}">Oublié ?</a>
                    </div>
                    <div class="group relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-slate-400 dark:text-gray-500 group-focus-within:text-primary transition-colors">
                            <i class="fa-solid fa-lock text-xs"></i>
                        </div>
                        <input type="password" id="password" name="password"
                            class="w-full pl-14 pr-6 py-5 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-300 dark:placeholder-gray-700 text-slate-900 dark:text-white text-sm"
                            required th:placeholder="#{login.password_placeholder}">
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit"
                    class="w-full bg-primary hover:bg-red-800 text-white font-black py-6 rounded-2xl shadow-2xl shadow-primary/20 transform transition active:scale-95 flex items-center justify-center group uppercase tracking-widest text-[10px]">
                    <span th:text="#{login.submit}">Accéder à mon espace</span>
                    <i
                        class="fa-solid fa-chevron-right ml-3 text-[8px] group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-12 text-center">
                <p class="text-[11px] font-bold text-slate-500 dark:text-gray-500 uppercase tracking-widest">
                    <span th:text="#{login.no_account}">Pas encore parmi nous ?</span>
                    <a th:href="@{/register}"
                        class="text-slate-900 dark:text-white hover:text-primary underline decoration-primary decoration-4 underline-offset-8 transition-all"
                        th:text="#{login.register}">
                        Rejoindre l'aventure
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer Note -->
        <p class="mt-12 text-center text-[9px] text-slate-400 dark:text-gray-600 font-bold uppercase tracking-[0.3em]"
            th:text="#{login.footer_copyright}">
            &copy; 2025 UNEVIE — Sécurité & Confidentialité
        </p>
    </div>

</body>

</html>
